server {
  listen 3000;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;
  error_page 404 /404.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  if ($legacy_redirect_uri != "") {
    return 301 $legacy_redirect_uri;
  }

  location ~* \.(?:css|gif|ico|jpe?g|js|png|svg|webp|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location = /zh-Hans {
    return 301 /zh-cn/;
  }

  location /zh-Hans/ {
    rewrite ^/zh-Hans(/.*)$ /zh-cn$1 permanent;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}

server {
  listen 3000;
  server_name learning.airoads.org www.airoads.org;

  if ($legacy_redirect_uri != "") {
    return 301 https://airoads.org$legacy_redirect_uri;
  }

  return 301 https://airoads.org$request_uri;
}
