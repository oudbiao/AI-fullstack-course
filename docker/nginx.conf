server {
  listen 3000;
  server_name _;
  absolute_redirect off;
  port_in_redirect off;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 1024;
  gzip_types
    application/javascript
    application/json
    application/xml
    image/svg+xml
    text/css
    text/javascript
    text/plain
    text/xml;

  # Docusaurus prefixes static image URLs with locale paths in localized pages.
  # The Docker build keeps only one shared /img copy to avoid a multi-GB image.
  location ~ ^/(zh-Hans|ja)/img/(.*)$ {
    try_files /img/$2 =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location ~* \.(?:css|gif|ico|jpe?g|js|png|svg|webp|woff2?)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
