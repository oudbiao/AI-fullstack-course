# ============================================
# airoads.org 域名配置
# ============================================

# --- HTTPS: 旧域名和 www 统一跳到主域名，避免重复 canonical ---
server {
    listen 443 ssl http2;
    server_name learning.airoads.org www.airoads.org;

    ssl_certificate     /etc/nginx/certs/airoads-origin.pem;
    ssl_certificate_key /etc/nginx/certs/airoads-origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    return 301 https://airoads.org$request_uri;
}

# --- HTTPS: 主域名代理到课程服务 ---
server {
    listen 443 ssl http2;
    server_name airoads.org;

    ssl_certificate     /etc/nginx/certs/airoads-origin.pem;
    ssl_certificate_key /etc/nginx/certs/airoads-origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;

    location = /zh-Hans {
        return 301 /zh-cn/;
    }

    location /zh-Hans/ {
        rewrite ^/zh-Hans(/.*)$ /zh-cn$1 permanent;
    }

    location / {
        proxy_pass http://ai-fullstack-course:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_redirect ~^http://([^/:]+):3000(/.*)$ https://$host$2;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

# --- HTTP → HTTPS（若未开放 80 端口可省略此 server）---
server {
    listen 80;
    server_name learning.airoads.org www.airoads.org;
    return 301 https://airoads.org$request_uri;
}

server {
    listen 80;
    server_name airoads.org;
    return 301 https://airoads.org$request_uri;
}
