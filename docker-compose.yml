services:
  ai-course:
    build: .
    image: ai-fullstack-course:latest
    container_name: ai-fullstack-course
    ports:
      - "3000:3000"
    networks:
      - ai-network
      - proxy-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  ai-network:
    driver: bridge
  proxy-net:
    external: true
