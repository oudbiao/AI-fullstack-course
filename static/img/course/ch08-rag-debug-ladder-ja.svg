<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">RAG デバッグ階段</title>
  <desc id="desc">文書、チャンク、検索、生成、引用、評価の順に RAG の悪い回答を調べる階段図。</desc>
  <style>
    .title{font:700 30px Arial,sans-serif;fill:#0f172a}
    .sub{font:400 17px Arial,sans-serif;fill:#475569}
    .label{font:700 19px Arial,sans-serif;fill:#111827}
    .text{font:400 15px Arial,sans-serif;fill:#374151}
    .num{font:700 22px Arial,sans-serif;fill:#ffffff}
  </style>
  <rect width="720" height="900" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">回答が悪い？階段で確認</text>
  <text x="360" y="88" text-anchor="middle" class="sub">モデル変更の前に、下の層から直します。</text>

  <g transform="translate(88 132)">
    <rect width="544" height="84" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <circle cx="38" cy="42" r="22" fill="#dc2626"/><text x="38" y="50" text-anchor="middle" class="num">1</text>
    <text x="76" y="34" class="label">元文書</text>
    <text x="76" y="61" class="text">答えは本当に出典資料に存在するか？</text>
  </g>
  <g transform="translate(88 248)">
    <rect width="544" height="84" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <circle cx="38" cy="42" r="22" fill="#d97706"/><text x="38" y="50" text-anchor="middle" class="num">2</text>
    <text x="76" y="34" class="label">チャンクと metadata</text>
    <text x="76" y="61" class="text">重要な文脈や出典情報が失われていないか？</text>
  </g>
  <g transform="translate(88 364)">
    <rect width="544" height="84" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="38" cy="42" r="22" fill="#16a34a"/><text x="38" y="50" text-anchor="middle" class="num">3</text>
    <text x="76" y="34" class="label">検索と順位</text>
    <text x="76" y="61" class="text">top-k に正しいチャンクが入り、上位にあるか？</text>
  </g>
  <g transform="translate(88 480)">
    <rect width="544" height="84" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <circle cx="38" cy="42" r="22" fill="#2563eb"/><text x="38" y="50" text-anchor="middle" class="num">4</text>
    <text x="76" y="34" class="label">Prompt と生成</text>
    <text x="76" y="61" class="text">出典ベース回答と no-answer を強制しているか？</text>
  </g>
  <g transform="translate(88 596)">
    <rect width="544" height="84" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="38" cy="42" r="22" fill="#7c3aed"/><text x="38" y="50" text-anchor="middle" class="num">5</text>
    <text x="76" y="34" class="label">引用と応答</text>
    <text x="76" y="61" class="text">ユーザーは回答の正確な出典を確認できるか？</text>
  </g>
  <g transform="translate(88 712)">
    <rect width="544" height="84" rx="18" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/>
    <circle cx="38" cy="42" r="22" fill="#0f766e"/><text x="38" y="50" text-anchor="middle" class="num">6</text>
    <text x="76" y="34" class="label">評価とログ</text>
    <text x="76" y="61" class="text">同じ質問セットで before/after を証明できるか？</text>
  </g>
</svg>
