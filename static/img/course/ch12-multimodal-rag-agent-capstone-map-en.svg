<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal RAG Agent capstone map</title>
  <desc id="desc">A map showing how multimodal records connect to RAG, Agent, prompts, engineering, and the capstone project.</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#fff7ed"/>
  <text x="360" y="58" text-anchor="middle" class="title">Multimodal Extends The Main Track</text>
  <text x="360" y="88" text-anchor="middle" class="sub">Use the same engineering habits with richer inputs and outputs.</text>
  <g transform="translate(86 128)"><rect width="548" height="88" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="35" class="label">RAG</text><text x="28" y="62" class="text">Retrieve PDF pages, screenshots, charts, captions, and text chunks.</text></g>
  <g transform="translate(86 240)"><rect width="548" height="88" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="35" class="label">Agent</text><text x="28" y="62" class="text">Observe visual input, choose tools, and leave traceable actions.</text></g>
  <g transform="translate(86 352)"><rect width="548" height="88" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="35" class="label">Prompt</text><text x="28" y="62" class="text">Version prompts for image, voice, storyboard, and review steps.</text></g>
  <g transform="translate(86 464)"><rect width="548" height="88" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="35" class="label">Engineering</text><text x="28" y="62" class="text">Track assets, license, review, export, latency, and cost.</text></g>
  <g transform="translate(86 576)"><rect width="548" height="88" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="35" class="label">Capstone</text><text x="28" y="62" class="text">Build a multimodal learning assistant or creative workspace.</text></g>
</svg>
