<svg xmlns="http://www.w3.org/2000/svg" width="720" height="790" viewBox="0 0 720 790" role="img" aria-labelledby="title desc">
  <title id="title">多模态作品集证据包</title>
  <desc id="desc">可复查多模态与 AIGC 项目需要保留的证据文件清单图。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="790" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">多模态证据包</text>
  <text x="360" y="88" text-anchor="middle" class="sub">来源、版本、审核和导出清楚，AIGC 才可交付。</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">multimodal_pipeline.md</text><text x="28" y="59" class="text">输入、解析、生成、审核、导出。</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">visual_records.jsonl</text><text x="28" y="59" class="text">来源、页码/区域/时间引用、文字、对象、不确定点。</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">prompts/</text><text x="28" y="59" class="text">Prompt 版本、参考素材、负面要求。</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">outputs/</text><text x="28" y="59" class="text">候选、选中、被拒输出和原因。</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">safety_review.md</text><text x="28" y="59" class="text">版权、肖像、敏感内容、事实性。</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">目标、命令、素材来源、示例输出、限制。</text></g>
</svg>
