<svg xmlns="http://www.w3.org/2000/svg" width="720" height="980" viewBox="0 0 720 980" role="img" aria-labelledby="title desc">
  <title id="title">Token to answer lifecycle</title>
  <desc id="desc">A vertical teaching diagram showing how user text becomes tokens, embeddings, Transformer context, next-token prediction, and validated output.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#0f172a}
      .sub{font:400 17px Arial,sans-serif;fill:#475569}
      .box-title{font:700 20px Arial,sans-serif;fill:#111827}
      .box-text{font:400 16px Arial,sans-serif;fill:#374151}
      .hint{font:700 15px Arial,sans-serif;fill:#0f766e}
    </style>
  </defs>
  <rect width="720" height="980" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">From Text to Answer</text>
  <text x="360" y="88" text-anchor="middle" class="sub">See the path first, then debug each checkpoint.</text>

  <g transform="translate(90 130)">
    <rect width="540" height="92" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
    <text x="28" y="35" class="box-title">1. User text</text>
    <text x="28" y="64" class="box-text">Task, examples, context, and output requirements enter together.</text>
  </g>
  <path d="M360 224 V270" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(90 282)">
    <rect width="540" height="92" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="28" y="35" class="box-title">2. Tokenizer</text>
    <text x="28" y="64" class="box-text">Splits text into tokens; token count affects cost and context.</text>
  </g>
  <path d="M360 376 V422" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(90 434)">
    <rect width="540" height="92" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="28" y="35" class="box-title">3. Embedding vectors</text>
    <text x="28" y="64" class="box-text">Tokens become numbers so the model can compare meaning.</text>
  </g>
  <path d="M360 528 V574" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(90 586)">
    <rect width="540" height="108" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
    <text x="28" y="35" class="box-title">4. Transformer context</text>
    <text x="28" y="64" class="box-text">Attention mixes tokens with previous words, examples, and rules.</text>
    <text x="28" y="90" class="hint">Debug here: conflicting context or unclear instructions.</text>
  </g>
  <path d="M360 696 V742" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(90 754)">
    <rect width="540" height="92" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="28" y="35" class="box-title">5. Next-token prediction</text>
    <text x="28" y="64" class="box-text">The model repeatedly chooses likely next tokens until it stops.</text>
  </g>
  <path d="M360 848 V894" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(90 906)">
    <rect width="540" height="56" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="28" y="36" class="box-title">6. Answer + validation: parse, score, and keep failures</text>
  </g>
</svg>
