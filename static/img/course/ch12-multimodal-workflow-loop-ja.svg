<svg xmlns="http://www.w3.org/2000/svg" width="720" height="930" viewBox="0 0 720 930" role="img" aria-labelledby="title desc">
  <title id="title">マルチモーダルワークフローループ</title>
  <desc id="desc">入力から解析 alignment、理解または生成、レビュー、export integration へ進むマルチモーダル縦型ワークフロー。</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#334155"/></marker><style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style></defs>
  <rect width="720" height="930" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">マルチモーダル製品ワークフロー</text>
  <text x="360" y="88" text-anchor="middle" class="sub">source、version、review、export boundary を残します。</text>
  <g transform="translate(95 132)"><rect width="530" height="82" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="34" class="label">1. Input</text><text x="28" y="60" class="text">text、image、screenshot、PDF、audio、video、asset。</text></g><path d="M360 216 V256" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 268)"><rect width="530" height="82" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="34" class="label">2. Parse / align</text><text x="28" y="60" class="text">OCR、transcript、layout、region、timestamp。</text></g><path d="M360 352 V392" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 404)"><rect width="530" height="82" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="34" class="label">3. Understand / generate</text><text x="28" y="60" class="text">answer、caption、image、voice、storyboard、video plan。</text></g><path d="M360 488 V528" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 540)"><rect width="530" height="82" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="34" class="label">4. Edit / review</text><text x="28" y="60" class="text">human selection、factual check、copyright、portrait rights。</text></g><path d="M360 624 V664" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 676)"><rect width="530" height="82" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="34" class="label">5. Export / integrate</text><text x="28" y="60" class="text">RAG index、Agent trace、creative package、final Demo。</text></g>
  <rect x="95" y="800" width="530" height="58" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="836" text-anchor="middle" class="label">確認や引用ができないものは、レビューに残します。</text>
</svg>
