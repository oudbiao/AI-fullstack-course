<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">视觉任务输出粒度阶梯</title>
  <desc id="desc">按输出粒度展示图像分类、目标检测、分割、OCR 或视觉理解的阶梯图。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 21px Arial,sans-serif;fill:#111827}.text{font:400 16px Arial,sans-serif;fill:#374151}.out{font:700 15px Arial,sans-serif;fill:#0f766e}</style>
  <rect width="720" height="900" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">同一张图，输出越来越细</text>
  <text x="360" y="88" text-anchor="middle" class="sub">视觉任务的区别，在于模型必须输出什么。</text>
  <g transform="translate(85 132)"><rect width="550" height="120" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="38" class="label">1. 分类</text><text x="28" y="68" class="text">问题：整张图主要是什么？</text><text x="28" y="96" class="out">输出：标签 + 置信度</text></g>
  <g transform="translate(85 284)"><rect width="550" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="38" class="label">2. 检测</text><text x="28" y="68" class="text">问题：每个物体在哪里？</text><text x="28" y="96" class="out">输出：框 + 标签 + 分数</text></g>
  <g transform="translate(85 436)"><rect width="550" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="38" class="label">3. 分割</text><text x="28" y="68" class="text">问题：哪些像素属于同一对象？</text><text x="28" y="96" class="out">输出：mask 或像素类别</text></g>
  <g transform="translate(85 588)"><rect width="550" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="38" class="label">4. OCR / 视觉理解</text><text x="28" y="68" class="text">问题：能读出什么文字、表格或含义？</text><text x="28" y="96" class="out">输出：文本、结构、答案或描述</text></g>
  <rect x="85" y="748" width="550" height="72" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="792" text-anchor="middle" class="label">输出越细，对标注和指标的要求越高。</text>
</svg>
