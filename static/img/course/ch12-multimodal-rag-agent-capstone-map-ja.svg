<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">マルチモーダル RAG、Agent、卒業プロジェクト図</title>
  <desc id="desc">マルチモーダル記録が RAG、Agent、Prompt、engineering、capstone へ接続する地図。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#fff7ed"/>
  <text x="360" y="58" text-anchor="middle" class="title">マルチモーダルは主線を拡張する</text>
  <text x="360" y="88" text-anchor="middle" class="sub">入出力が豊かになっても、工程習慣は同じです。</text>
  <g transform="translate(86 128)"><rect width="548" height="88" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="35" class="label">RAG</text><text x="28" y="62" class="text">PDF ページ、screenshot、chart、caption、text chunk を検索。</text></g>
  <g transform="translate(86 240)"><rect width="548" height="88" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="35" class="label">Agent</text><text x="28" y="62" class="text">visual input を観察し、tool を選び、traceable action を残す。</text></g>
  <g transform="translate(86 352)"><rect width="548" height="88" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="35" class="label">Prompt</text><text x="28" y="62" class="text">image、voice、storyboard、review の Prompt 版を残す。</text></g>
  <g transform="translate(86 464)"><rect width="548" height="88" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="35" class="label">Engineering</text><text x="28" y="62" class="text">asset、license、review、export、latency、cost を記録。</text></g>
  <g transform="translate(86 576)"><rect width="548" height="88" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="35" class="label">Capstone</text><text x="28" y="62" class="text">マルチモーダル学習アシスタントまたは創作ワークスペース。</text></g>
</svg>
