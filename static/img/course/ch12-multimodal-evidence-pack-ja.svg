<svg xmlns="http://www.w3.org/2000/svg" width="720" height="790" viewBox="0 0 720 790" role="img" aria-labelledby="title desc">
  <title id="title">マルチモーダルポートフォリオ証拠パック</title>
  <desc id="desc">レビュー可能なマルチモーダルと AIGC プロジェクトに必要な証拠ファイルのチェックリスト。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="790" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">マルチモーダル証拠パック</text>
  <text x="360" y="88" text-anchor="middle" class="sub">source、version、review、export が明確なら AIGC は納品可能です。</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">multimodal_pipeline.md</text><text x="28" y="59" class="text">input、parsing、generation、review、export。</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">visual_records.jsonl</text><text x="28" y="59" class="text">source、page/region/time reference、text、objects、uncertainty。</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">prompts/</text><text x="28" y="59" class="text">Prompt 版、reference assets、negative requirements。</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">outputs/</text><text x="28" y="59" class="text">candidate、selected、rejected outputs と理由。</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">safety_review.md</text><text x="28" y="59" class="text">copyright、portrait、sensitive content、factuality。</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">goal、command、source materials、sample output、limitations。</text></g>
</svg>
