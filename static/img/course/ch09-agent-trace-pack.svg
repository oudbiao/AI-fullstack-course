<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">Agent trace 证据包</title>
  <desc id="desc">可追踪 Agent 项目的作品集证据文件检查图。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">可追踪 Agent 证据</text>
  <text x="360" y="88" text-anchor="middle" class="sub">真正的 Agent 项目必须能回放、能控制、能评估。</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">tools_schema.md</text><text x="28" y="59" class="text">工具名称、用途、参数、返回、错误、风险等级。</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">agent_traces.jsonl</text><text x="28" y="59" class="text">目标、步骤、动作、输入、观察、结果。</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">safety_boundary.md</text><text x="28" y="59" class="text">工具白名单、最大步数、拦截动作、人工确认。</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">failure_cases.md</text><text x="28" y="59" class="text">工具选错、参数错误、循环、不支持的回答。</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">eval_tasks.csv</text><text x="28" y="59" class="text">固定任务、成功标准、完成率和安全分数。</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">运行命令、trace 示例、安全样例、限制。</text></g>
</svg>
