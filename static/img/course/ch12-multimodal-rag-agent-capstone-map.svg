<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">多模态 RAG、Agent 与收官项目图</title>
  <desc id="desc">展示多模态记录如何连接到 RAG、Agent、Prompt、工程和收官项目的地图。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#fff7ed"/>
  <text x="360" y="58" text-anchor="middle" class="title">多模态扩展课程主线</text>
  <text x="360" y="88" text-anchor="middle" class="sub">输入输出更丰富，但工程习惯不变。</text>
  <g transform="translate(86 128)"><rect width="548" height="88" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="35" class="label">RAG</text><text x="28" y="62" class="text">检索 PDF 页、截图、图表、图片说明和文本 chunk。</text></g>
  <g transform="translate(86 240)"><rect width="548" height="88" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="35" class="label">Agent</text><text x="28" y="62" class="text">观察视觉输入、选择工具，并留下可追踪动作。</text></g>
  <g transform="translate(86 352)"><rect width="548" height="88" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="35" class="label">Prompt</text><text x="28" y="62" class="text">为图片、语音、分镜和审核步骤保留 Prompt 版本。</text></g>
  <g transform="translate(86 464)"><rect width="548" height="88" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="35" class="label">工程</text><text x="28" y="62" class="text">记录素材、授权、审核、导出、延迟和成本。</text></g>
  <g transform="translate(86 576)"><rect width="548" height="88" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="35" class="label">收官项目</text><text x="28" y="62" class="text">构建多模态学习助手或创意工作台。</text></g>
</svg>
