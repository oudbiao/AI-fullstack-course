<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">String indexing and slicing</title>
  <desc id="desc">Python string characters have zero-based indexes. A slice includes the start index and excludes the stop index.</desc>
  <rect width="960" height="540" fill="#f7fafc"/>
  <text x="56" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">String indexing and slicing</text>
  <text x="56" y="108" font-family="Arial, sans-serif" font-size="18" fill="#506070">text = "Python"  |  slice rule: include start, exclude stop</text>
  <g transform="translate(96 180)">
    <g font-family="Arial, sans-serif" text-anchor="middle">
      <text x="48" y="-22" font-size="16" fill="#667085">0</text>
      <text x="138" y="-22" font-size="16" fill="#667085">1</text>
      <text x="228" y="-22" font-size="16" fill="#667085">2</text>
      <text x="318" y="-22" font-size="16" fill="#667085">3</text>
      <text x="408" y="-22" font-size="16" fill="#667085">4</text>
      <text x="498" y="-22" font-size="16" fill="#667085">5</text>
      <rect x="0" y="0" width="86" height="86" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
      <rect x="90" y="0" width="86" height="86" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
      <rect x="180" y="0" width="86" height="86" rx="8" fill="#e8f3ff" stroke="#2f80ed" stroke-width="3"/>
      <rect x="270" y="0" width="86" height="86" rx="8" fill="#e8f3ff" stroke="#2f80ed" stroke-width="3"/>
      <rect x="360" y="0" width="86" height="86" rx="8" fill="#e8f3ff" stroke="#2f80ed" stroke-width="3"/>
      <rect x="450" y="0" width="86" height="86" rx="8" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
      <text x="43" y="56" font-size="34" font-weight="700" fill="#172033">P</text>
      <text x="133" y="56" font-size="34" font-weight="700" fill="#172033">y</text>
      <text x="223" y="56" font-size="34" font-weight="700" fill="#172033">t</text>
      <text x="313" y="56" font-size="34" font-weight="700" fill="#172033">h</text>
      <text x="403" y="56" font-size="34" font-weight="700" fill="#172033">o</text>
      <text x="493" y="56" font-size="34" font-weight="700" fill="#172033">n</text>
      <text x="48" y="122" font-size="16" fill="#667085">-6</text>
      <text x="138" y="122" font-size="16" fill="#667085">-5</text>
      <text x="228" y="122" font-size="16" fill="#667085">-4</text>
      <text x="318" y="122" font-size="16" fill="#667085">-3</text>
      <text x="408" y="122" font-size="16" fill="#667085">-2</text>
      <text x="498" y="122" font-size="16" fill="#667085">-1</text>
    </g>
    <path d="M180 110 L180 150 L446 150 L446 110" fill="none" stroke="#f2994a" stroke-width="5" stroke-linecap="round"/>
    <text x="313" y="188" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#172033">text[2:5] -> "tho"</text>
    <text x="313" y="224" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#506070">start at index 2, stop before index 5</text>
  </g>
  <g transform="translate(676 174)" font-family="Arial, sans-serif">
    <rect width="220" height="204" rx="10" fill="#ffffff" stroke="#d0d5dd"/>
    <text x="24" y="44" font-size="20" font-weight="700" fill="#172033">Remember</text>
    <text x="24" y="82" font-size="17" fill="#344054">text[0] -> P</text>
    <text x="24" y="114" font-size="17" fill="#344054">text[-1] -> n</text>
    <text x="24" y="146" font-size="17" fill="#344054">text[:3] -> Pyt</text>
    <text x="24" y="178" font-size="17" fill="#344054">text[::-1] -> nohtyP</text>
  </g>
</svg>
