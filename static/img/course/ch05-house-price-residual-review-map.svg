<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">房价预测残差复盘图</title>
  <desc id="desc">面向新人展示从预测结果到残差分桶和下一步改进动作的教学图。</desc>
  <rect width="1200" height="675" fill="#f7fafc"/>
  <text x="80" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">房价项目：先读懂错误，再追分数</text>
  <text x="80" y="116" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4b5563">用残差解释回归模型在哪里不稳定。</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="180" width="210" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="195" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">真实值 vs 预测值</text>
    <text x="195" y="255" text-anchor="middle" font-size="16" fill="#1e40af">散点图</text>
    <path d="M330 235h90" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="450" y="180" width="210" height="110" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="555" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">残差</text>
    <text x="555" y="255" text-anchor="middle" font-size="16" fill="#92400e">真实值 - 预测值</text>
    <path d="M690 235h90" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="810" y="180" width="210" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="915" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">错误分桶</text>
    <text x="915" y="255" text-anchor="middle" font-size="16" fill="#166534">低价 / 中价 / 高价</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="160" y="390" width="880" height="145" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="210" y="438" font-size="22" font-weight="700" fill="#111827">看完图后要问什么</text>
    <text x="230" y="480" font-size="18" fill="#374151">1. 哪个价格段的平均误差最大？</text>
    <text x="230" y="515" font-size="18" fill="#374151">2. 模型是否系统性低估高价房？</text>
    <text x="650" y="480" font-size="18" fill="#374151">3. 地区或特征组合是否一起失效？</text>
    <text x="650" y="515" font-size="18" fill="#374151">4. 下一步该改数据、特征还是模型？</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
