<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Matrix multiplication shape rule</title>
  <desc id="desc">A m by n matrix can multiply a n by p matrix because the inner dimensions match, producing m by p.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Matrix multiplication is a shape handshake</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="18" fill="#475569">The inner dimensions must match; the outer dimensions become the result.</text>
  <g transform="translate(92 146)">
    <rect x="0" y="0" width="170" height="190" rx="12" fill="#dbeafe" stroke="#2563eb"/>
    <text x="54" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1d4ed8">A</text>
    <text x="44" y="92" font-family="Arial, sans-serif" font-size="26" fill="#0f172a">m x n</text>
    <text x="25" y="142" font-family="Arial, sans-serif" font-size="18" fill="#334155">m rows</text>
    <text x="25" y="166" font-family="Arial, sans-serif" font-size="18" fill="#334155">n columns</text>
  </g>
  <text x="296" y="246" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#334155">@</text>
  <g transform="translate(358 146)">
    <rect x="0" y="0" width="170" height="190" rx="12" fill="#ffedd5" stroke="#f97316"/>
    <text x="54" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#c2410c">B</text>
    <text x="44" y="92" font-family="Arial, sans-serif" font-size="26" fill="#0f172a">n x p</text>
    <text x="25" y="142" font-family="Arial, sans-serif" font-size="18" fill="#334155">n rows</text>
    <text x="25" y="166" font-family="Arial, sans-serif" font-size="18" fill="#334155">p columns</text>
  </g>
  <text x="562" y="246" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#334155">=</text>
  <g transform="translate(624 146)">
    <rect x="0" y="0" width="190" height="190" rx="12" fill="#dcfce7" stroke="#16a34a"/>
    <text x="62" y="44" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#15803d">C</text>
    <text x="47" y="92" font-family="Arial, sans-serif" font-size="26" fill="#0f172a">m x p</text>
    <text x="28" y="142" font-family="Arial, sans-serif" font-size="18" fill="#334155">m rows</text>
    <text x="28" y="166" font-family="Arial, sans-serif" font-size="18" fill="#334155">p columns</text>
  </g>
  <path d="M217 372C296 422 406 422 483 372" fill="none" stroke="#f97316" stroke-width="5" marker-end="url(#arrow-orange)"/>
  <text x="290" y="454" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#c2410c">n must equal n</text>
  <path d="M176 118C310 74 596 74 724 118" fill="none" stroke="#16a34a" stroke-width="4" stroke-dasharray="10 8"/>
  <text x="334" y="123" font-family="Arial, sans-serif" font-size="20" fill="#15803d">outer dimensions survive</text>
  <defs>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#f97316"/></marker>
  </defs>
</svg>
