<svg xmlns="http://www.w3.org/2000/svg" width="720" height="760" viewBox="0 0 720 760" role="img" aria-labelledby="title desc">
  <title id="title">Vision portfolio evidence pack</title>
  <desc id="desc">A checklist of evidence files for a reviewable computer vision project.</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="760" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">Vision Evidence Pack</text>
  <text x="360" y="88" text-anchor="middle" class="sub">A vision project is reviewable when data, metrics, and failures are visible.</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">pixel_lab.py / opencv_demo.py</text><text x="28" y="59" class="text">Image loading or generation, preprocessing, saved output.</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">vision_dataset.md</text><text x="28" y="59" class="text">Source, classes, counts, annotation method, limitations.</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">eval_results.md</text><text x="28" y="59" class="text">Accuracy/F1, mAP, IoU/Dice, OCR hit rate.</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">failure_cases.md</text><text x="28" y="59" class="text">Wrong images, likely cause, next fix.</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">Task goal, run command, input/output, scenario boundary.</text></g>
</svg>
