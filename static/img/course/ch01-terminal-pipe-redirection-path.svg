<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">终端管道、重定向与 PATH 心智模型</title>
  <desc id="desc">一张课程占位图，展示终端输出如何经过管道流转、如何用重定向保存日志，以及 PATH 如何寻找命令。</desc>
  <defs>
    <style>
      .bg { fill: #f7faf8; }
      .panel { fill: #ffffff; stroke: #23302a; stroke-width: 3; rx: 22; }
      .soft { fill: #e8f3ee; stroke: #3b6655; stroke-width: 3; rx: 18; }
      .accent { fill: #f4c95d; stroke: #6b5515; stroke-width: 3; rx: 18; }
      .warn { fill: #f7d8c8; stroke: #7f4631; stroke-width: 3; rx: 18; }
      .text { font-family: Arial, Helvetica, sans-serif; fill: #1f2924; }
      .title { font-size: 48px; font-weight: 700; }
      .h2 { font-size: 32px; font-weight: 700; }
      .body { font-size: 26px; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 25px; fill: #14352a; }
      .small { font-size: 21px; fill: #4d5d55; }
      .arrow { stroke: #1f5e4a; stroke-width: 7; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#1f5e4a"/>
    </marker>
  </defs>

  <rect class="bg" width="1536" height="1024"/>

  <text class="text title" x="92" y="92">终端数据流：管道、重定向、PATH</text>
  <text class="text body" x="92" y="137">把命令看成路线：输出向前传，文件保存证据，PATH 寻找工具。</text>

  <rect class="panel" x="84" y="190" width="1368" height="270" rx="22"/>
  <text class="text h2" x="122" y="246">1. 管道：输出变成下一个输入</text>
  <rect class="soft" x="122" y="292" width="280" height="84" rx="18"/>
  <text class="text mono" x="153" y="345">ls -la</text>
  <path class="arrow" d="M 420 334 H 545"/>
  <rect class="soft" x="566" y="292" width="300" height="84" rx="18"/>
  <text class="text mono" x="593" y="345">grep ".py"</text>
  <path class="arrow" d="M 884 334 H 1010"/>
  <rect class="soft" x="1032" y="292" width="330" height="84" rx="18"/>
  <text class="text mono" x="1064" y="345">wc -l</text>
  <text class="text small" x="122" y="418">像流水线：每个命令接收文本、处理文本、再传给下一个命令。</text>

  <rect class="panel" x="84" y="512" width="636" height="330" rx="22"/>
  <text class="text h2" x="122" y="568">2. 重定向：保存证据</text>
  <rect class="accent" x="122" y="620" width="250" height="78" rx="18"/>
  <text class="text mono" x="151" y="670">python train.py</text>
  <path class="arrow" d="M 390 659 H 491"/>
  <rect class="warn" x="510" y="620" width="160" height="78" rx="18"/>
  <text class="text mono" x="555" y="670">&gt;</text>
  <rect class="soft" x="285" y="738" width="300" height="66" rx="18"/>
  <text class="text mono" x="321" y="781">training_log.txt</text>
  <path class="arrow" d="M 589 698 C 589 722 540 735 474 745"/>
  <text class="text small" x="122" y="880">&gt; 覆盖日志；&gt;&gt; 追加到末尾。</text>

  <rect class="panel" x="774" y="512" width="678" height="330" rx="22"/>
  <text class="text h2" x="812" y="568">3. PATH：找到命令文件</text>
  <rect class="accent" x="812" y="620" width="190" height="78" rx="18"/>
  <text class="text mono" x="856" y="670">python</text>
  <path class="arrow" d="M 1020 659 H 1116"/>
  <rect class="soft" x="1136" y="588" width="250" height="142" rx="18"/>
  <text class="text mono" x="1172" y="638">/usr/bin</text>
  <text class="text mono" x="1172" y="677">/bin</text>
  <text class="text mono" x="1172" y="716">~/miniconda3/bin</text>
  <text class="text small" x="812" y="790">Shell 按顺序检查 PATH 文件夹，并运行第一个匹配程序。</text>
  <text class="text small" x="812" y="830">如果都找不到，就会看到 command not found。</text>

  <rect class="soft" x="260" y="910" width="1016" height="64" rx="18"/>
  <text class="text body" x="302" y="951">排错习惯：先运行 pwd、ls、which python，再把有用输出保存到日志。</text>
</svg>
