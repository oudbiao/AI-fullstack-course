<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Vector norm and unit vector</title>
  <desc id="desc">A 3-4-5 vector is normalized into a unit vector with the same direction and length one.</desc>
  <rect width="960" height="540" fill="#f8fafc"/>
  <text x="48" y="58" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#0f172a">Norm turns a vector into a measured length</text>
  <text x="48" y="92" font-family="Arial, sans-serif" font-size="18" fill="#475569">Normalize by dividing every component by the length.</text>
  <g transform="translate(92 116)">
    <rect x="0" y="0" width="420" height="330" rx="14" fill="#ffffff" stroke="#cbd5e1"/>
    <g transform="translate(54 264)" stroke="#cbd5e1" stroke-width="1">
      <path d="M0 0H310M0 -60H310M0 -120H310M0 -180H310M0 -240H310"/>
      <path d="M0 0V-260M60 0V-260M120 0V-260M180 0V-260M240 0V-260M300 0V-260"/>
    </g>
    <g transform="translate(54 264)">
      <path d="M0 0H320" stroke="#334155" stroke-width="2"/>
      <path d="M0 0V-270" stroke="#334155" stroke-width="2"/>
      <path d="M0 0L180 -240" stroke="#2563eb" stroke-width="6" marker-end="url(#arrow-blue)"/>
      <path d="M0 0H180V-240" fill="none" stroke="#f97316" stroke-width="4" stroke-dasharray="10 8"/>
      <text x="82" y="30" font-family="Arial, sans-serif" font-size="18" fill="#f97316">3</text>
      <text x="194" y="-116" font-family="Arial, sans-serif" font-size="18" fill="#f97316">4</text>
      <text x="74" y="-142" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#2563eb">a = [3, 4]</text>
      <text x="112" y="-92" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">||a|| = 5</text>
    </g>
  </g>
  <g transform="translate(562 126)">
    <rect x="0" y="0" width="330" height="98" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="24" y="38" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">a / ||a||</text>
    <text x="24" y="70" font-family="Arial, sans-serif" font-size="18" fill="#334155">[3, 4] / 5 = [0.6, 0.8]</text>
    <rect x="0" y="128" width="330" height="160" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <path d="M58 118C78 92 100 78 130 70" fill="none" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow-gray)"/>
    <g transform="translate(62 252)">
      <path d="M0 0H210" stroke="#334155" stroke-width="2"/>
      <path d="M0 0V-112" stroke="#334155" stroke-width="2"/>
      <path d="M0 0L126 -84" stroke="#16a34a" stroke-width="6" marker-end="url(#arrow-green)"/>
      <text x="78" y="-52" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#16a34a">unit vector</text>
      <text x="72" y="30" font-family="Arial, sans-serif" font-size="18" fill="#0f172a">length = 1</text>
    </g>
  </g>
  <text x="92" y="486" font-family="Arial, sans-serif" font-size="20" fill="#0f172a">Same direction, different scale: norm measures size; unit vector keeps direction.</text>
  <defs>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#2563eb"/></marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 Z" fill="#16a34a"/></marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#94a3b8"/></marker>
  </defs>
</svg>
