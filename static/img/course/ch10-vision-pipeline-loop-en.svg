<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Vision pipeline and failure review loop</title>
  <desc id="desc">A vertical loop for vision projects from input image to preprocessing, model prediction, metrics, visualization, and failure review.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#334155"/></marker><style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style></defs>
  <rect width="720" height="900" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">Vision Debug Loop</text>
  <text x="360" y="88" text-anchor="middle" class="sub">Keep the image, preprocessing, prediction, metric, and failure visible.</text>
  <g transform="translate(95 132)"><rect width="530" height="78" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="32" class="label">1. Input image</text><text x="28" y="58" class="text">Check clarity, size, lighting, angle, background.</text></g><path d="M360 212 V252" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 264)"><rect width="530" height="78" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="32" class="label">2. Preprocessing</text><text x="28" y="58" class="text">Resize, crop, normalize, gray, edge, augmentation.</text></g><path d="M360 344 V384" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 396)"><rect width="530" height="78" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="32" class="label">3. Model prediction</text><text x="28" y="58" class="text">Label, box, mask, OCR text, or visual answer.</text></g><path d="M360 476 V516" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 528)"><rect width="530" height="78" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="32" class="label">4. Metrics</text><text x="28" y="58" class="text">Accuracy/F1, mAP, IoU, Dice, OCR hit rate.</text></g><path d="M360 608 V648" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 660)"><rect width="530" height="78" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="32" class="label">5. Visualize prediction</text><text x="28" y="58" class="text">Save boxes, masks, labels, and confidence on the image.</text></g><path d="M360 740 V780" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 792)"><rect width="530" height="58" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/><text x="28" y="36" class="label">6. Failure review: data, label, preprocessing, model, scene</text></g>
</svg>
