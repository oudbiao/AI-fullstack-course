<svg xmlns="http://www.w3.org/2000/svg" width="720" height="790" viewBox="0 0 720 790" role="img" aria-labelledby="title desc">
  <title id="title">Multimodal portfolio evidence pack</title>
  <desc id="desc">A checklist of evidence files for a reviewable multimodal and AIGC project.</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="790" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">Multimodal Evidence Pack</text>
  <text x="360" y="88" text-anchor="middle" class="sub">AIGC work becomes deliverable when sources, versions, review, and export are clear.</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">multimodal_pipeline.md</text><text x="28" y="59" class="text">Input, parsing, generation, review, export.</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">visual_records.jsonl</text><text x="28" y="59" class="text">Source, page/region/time reference, text, objects, uncertainty.</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">prompts/</text><text x="28" y="59" class="text">Prompt versions, reference assets, negative requirements.</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">outputs/</text><text x="28" y="59" class="text">Candidate, selected, rejected outputs and reasons.</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">safety_review.md</text><text x="28" y="59" class="text">Copyright, portrait rights, sensitive content, factuality.</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">Goal, command, sources, sample output, limitations.</text></g>
</svg>
