<svg xmlns="http://www.w3.org/2000/svg" width="720" height="790" viewBox="0 0 720 790" role="img" aria-labelledby="title desc">
  <title id="title">NLP ポートフォリオ証拠パック</title>
  <desc id="desc">レビュー可能な NLP プロジェクトに必要な証拠ファイルのチェックリスト。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="790" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">NLP 証拠パック</text>
  <text x="360" y="88" text-anchor="middle" class="sub">label、schema、指標、失敗が見えると、テキストプロジェクトはレビュー可能です。</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">text_cleaning.py</text><text x="28" y="59" class="text">cleaning、tokenization、before/after 例。</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">label_guide.md</text><text x="28" y="59" class="text">定義、境界ケース、正例と反例。</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">classification_report.md</text><text x="28" y="59" class="text">指標、混同行列、エラー表、モデル比較。</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">extraction_examples.jsonl</text><text x="28" y="59" class="text">元文、抽出フィールド、検証結果。</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">failure_cases.md</text><text x="28" y="59" class="text">紛らわしいラベル、欠損フィールド、根拠なし事実。</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">タスク、実行コマンド、入出力、指標、制限。</text></g>
</svg>
