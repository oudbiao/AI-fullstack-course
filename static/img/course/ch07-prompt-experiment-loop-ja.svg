<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">Prompt 実験ループ</title>
  <desc id="desc">Prompt エンジニアリングの縦型ループ。固定ケース、1つの変更、実行、検証、失敗記録、反復。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 Z" fill="#334155"/>
    </marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#0f172a}
      .sub{font:400 17px Arial,sans-serif;fill:#475569}
      .step{font:700 20px Arial,sans-serif;fill:#111827}
      .text{font:400 16px Arial,sans-serif;fill:#374151}
      .tag{font:700 15px Arial,sans-serif;fill:#b45309}
    </style>
  </defs>
  <rect width="720" height="900" fill="#fff7ed"/>
  <text x="360" y="58" text-anchor="middle" class="title">Prompt 作業 = 小さな実験</text>
  <text x="360" y="88" text-anchor="middle" class="sub">ケースを固定し、1つだけ変え、毎回検証します。</text>

  <g transform="translate(110 135)">
    <rect width="500" height="90" rx="18" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
    <text x="26" y="34" class="step">1. 固定入力ケース</text>
    <text x="26" y="63" class="text">同じ質問、境界ケース、期待ポイントを使います。</text>
  </g>
  <path d="M360 228 V278" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(110 290)">
    <rect width="500" height="90" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="26" y="34" class="step">2. 1つの Prompt 版</text>
    <text x="26" y="63" class="text">役割、例、形式、基準のどれか1つだけ変えます。</text>
  </g>
  <path d="M360 383 V433" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(110 445)">
    <rect width="500" height="90" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
    <text x="26" y="34" class="step">3. モデルを実行</text>
    <text x="26" y="63" class="text">まずオフラインの玩具ランナー、後で本物の LLM SDK。</text>
  </g>
  <path d="M360 538 V588" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(110 600)">
    <rect width="500" height="90" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
    <text x="26" y="34" class="step">4. 出力を検証</text>
    <text x="26" y="63" class="text">JSON 解析、フィールド確認、期待点で採点。</text>
  </g>
  <path d="M360 693 V743" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <g transform="translate(110 755)">
    <rect width="500" height="90" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
    <text x="26" y="34" class="step">5. 失敗を記録</text>
    <text x="26" y="63" class="text">悪い出力、原因候補、次の変更を保存します。</text>
  </g>

  <path d="M610 800 C675 730 675 215 610 178" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="642" y="500" class="tag" transform="rotate(90 642 500)">1つだけ変えて繰り返す</text>
</svg>
