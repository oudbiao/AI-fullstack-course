<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">Agent trace evidence pack</title>
  <desc id="desc">A checklist diagram of portfolio evidence files for a traceable Agent project.</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">Traceable Agent Evidence</text>
  <text x="360" y="88" text-anchor="middle" class="sub">A real Agent project must be replayable, controllable, and evaluable.</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">tools_schema.md</text><text x="28" y="59" class="text">Tool name, purpose, parameters, returns, errors, risk.</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">agent_traces.jsonl</text><text x="28" y="59" class="text">Goal, step, action, input, observation, result.</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">safety_boundary.md</text><text x="28" y="59" class="text">Whitelisted tools, max steps, blocked actions, approvals.</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">failure_cases.md</text><text x="28" y="59" class="text">Wrong tools, bad parameters, loops, unsupported answers.</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">eval_tasks.csv</text><text x="28" y="59" class="text">Fixed tasks, success criteria, completion and safety scores.</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">Run command, trace example, safety example, limitations.</text></g>
</svg>
