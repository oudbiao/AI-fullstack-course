<svg xmlns="http://www.w3.org/2000/svg" width="720" height="900" viewBox="0 0 720 900" role="img" aria-labelledby="title desc">
  <title id="title">視覚タスク出力粒度の階段</title>
  <desc id="desc">出力粒度によって画像分類、物体検出、セグメンテーション、OCR または視覚理解を示す階段図。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 21px Arial,sans-serif;fill:#111827}.text{font:400 16px Arial,sans-serif;fill:#374151}.out{font:700 15px Arial,sans-serif;fill:#0f766e}</style>
  <rect width="720" height="900" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">同じ画像、より細かな出力へ</text>
  <text x="360" y="88" text-anchor="middle" class="sub">視覚タスクの違いは、モデルが何を出すかです。</text>
  <g transform="translate(85 132)"><rect width="550" height="120" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="38" class="label">1. 分類</text><text x="28" y="68" class="text">質問：画像全体は主に何か？</text><text x="28" y="96" class="out">出力：ラベル + confidence</text></g>
  <g transform="translate(85 284)"><rect width="550" height="120" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="38" class="label">2. 検出</text><text x="28" y="68" class="text">質問：各物体はどこにあるか？</text><text x="28" y="96" class="out">出力：box + label + score</text></g>
  <g transform="translate(85 436)"><rect width="550" height="120" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="38" class="label">3. セグメンテーション</text><text x="28" y="68" class="text">質問：どのピクセルが同じ領域か？</text><text x="28" y="96" class="out">出力：mask またはピクセルクラス</text></g>
  <g transform="translate(85 588)"><rect width="550" height="120" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="38" class="label">4. OCR / 視覚理解</text><text x="28" y="68" class="text">質問：どんな文字、表、意味を読めるか？</text><text x="28" y="96" class="out">出力：テキスト、構造、回答、説明</text></g>
  <rect x="85" y="748" width="550" height="72" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="792" text-anchor="middle" class="label">出力が細かいほど、ラベルと指標も厳しくなります。</text>
</svg>
