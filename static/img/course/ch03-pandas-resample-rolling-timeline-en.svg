<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Pandas resample and rolling timeline</title>
  <desc id="desc">A teaching diagram contrasting resampling, which changes time frequency, with rolling, which moves a fixed window along time.</desc>
  <rect width="1200" height="680" fill="#fbfaf7"/>
  <text x="64" y="76" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Time series: resample changes frequency, rolling moves a window</text>
  <text x="64" y="114" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52606d">Both work along time, but they answer different questions.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="178" width="1040" height="160" rx="8" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="116" y="222" font-size="24" font-weight="700" fill="#102a43">resample("ME").sum()</text>
    <text x="116" y="254" font-size="17" fill="#52606d">Daily dots are grouped into calendar buckets, then summarized.</text>
    <g transform="translate(116 286)">
      <line x1="0" y1="0" x2="900" y2="0" stroke="#9fb3c8" stroke-width="3"/>
      <g fill="#38bdf8"><circle cx="20" cy="0" r="7"/><circle cx="55" cy="0" r="7"/><circle cx="90" cy="0" r="7"/><circle cx="125" cy="0" r="7"/><circle cx="210" cy="0" r="7"/><circle cx="245" cy="0" r="7"/><circle cx="280" cy="0" r="7"/><circle cx="365" cy="0" r="7"/><circle cx="400" cy="0" r="7"/><circle cx="435" cy="0" r="7"/></g>
      <g fill="none" stroke="#0f766e" stroke-width="3"><rect x="0" y="-24" width="155" height="48" rx="6"/><rect x="190" y="-24" width="115" height="48" rx="6"/><rect x="345" y="-24" width="115" height="48" rx="6"/></g>
      <text x="78" y="58" font-size="16" text-anchor="middle" fill="#0f766e">Jan sum</text><text x="248" y="58" font-size="16" text-anchor="middle" fill="#0f766e">Feb sum</text><text x="402" y="58" font-size="16" text-anchor="middle" fill="#0f766e">Mar sum</text>
    </g>
    <rect x="80" y="392" width="1040" height="160" rx="8" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="116" y="436" font-size="24" font-weight="700" fill="#102a43">rolling(window=7).mean()</text>
    <text x="116" y="468" font-size="17" fill="#52606d">A fixed-size window slides day by day and calculates a local statistic.</text>
    <g transform="translate(116 500)">
      <line x1="0" y1="0" x2="900" y2="0" stroke="#9fb3c8" stroke-width="3"/>
      <g fill="#f97316"><circle cx="20" cy="0" r="7"/><circle cx="55" cy="0" r="7"/><circle cx="90" cy="0" r="7"/><circle cx="125" cy="0" r="7"/><circle cx="160" cy="0" r="7"/><circle cx="195" cy="0" r="7"/><circle cx="230" cy="0" r="7"/><circle cx="265" cy="0" r="7"/><circle cx="300" cy="0" r="7"/><circle cx="335" cy="0" r="7"/></g>
      <rect x="0" y="-27" width="250" height="54" rx="6" fill="#fed7aa" fill-opacity=".5" stroke="#f97316" stroke-width="3"/>
      <path d="M252 0 L310 0" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="125" y="60" font-size="16" text-anchor="middle" fill="#9a3412">7-day window</text>
    </g>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f97316"/></marker></defs>
</svg>
