<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="1024" viewBox="0 0 1536 1024" role="img" aria-labelledby="title desc">
  <title id="title">PyTorch training debug check order</title>
  <desc id="desc">A course SVG teaching diagram showing the order beginners should check when a PyTorch training loop does not learn.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .panel { fill: #ffffff; stroke: #26303f; stroke-width: 3; }
      .blue { fill: #e5eef9; stroke: #315d95; stroke-width: 3; }
      .green { fill: #e7f4ec; stroke: #327a55; stroke-width: 3; }
      .gold { fill: #fff1c9; stroke: #8b6b17; stroke-width: 3; }
      .red { fill: #f8ded8; stroke: #914535; stroke-width: 3; }
      .ink { fill: #202736; font-family: Arial, Helvetica, sans-serif; }
      .title { font-size: 48px; font-weight: 700; }
      .body { font-size: 25px; }
      .h2 { font-size: 30px; font-weight: 700; }
      .small { font-size: 21px; fill: #526071; font-family: Arial, Helvetica, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace; font-size: 23px; fill: #182536; }
      .arrow { stroke: #2b5e91; stroke-width: 7; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .thin { stroke: #7b8798; stroke-width: 4; fill: none; stroke-linecap: round; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#2b5e91"/>
    </marker>
  </defs>

  <rect class="bg" width="1536" height="1024"/>
  <text class="ink title" x="88" y="92">When Training Does Not Improve: Check in This Order</text>
  <text class="ink body" x="88" y="137">Most PyTorch bugs are found before changing the model. Verify the pipeline from data to update.</text>

  <rect class="panel" x="84" y="190" width="392" height="220" rx="22"/>
  <text class="ink h2" x="122" y="246">1. Batch sanity</text>
  <text class="ink body" x="122" y="294">Data loaded?</text>
  <text class="ink body" x="122" y="334">Shapes match?</text>
  <text class="ink body" x="122" y="374">Device and dtype OK?</text>

  <path class="arrow" d="M 500 300 H 612"/>

  <rect class="panel" x="636" y="190" width="392" height="220" rx="22"/>
  <text class="ink h2" x="674" y="246">2. Labels and loss</text>
  <text class="ink body" x="674" y="294">Labels aligned?</text>
  <text class="ink body" x="674" y="334">Loss matches task?</text>
  <text class="ink body" x="674" y="374">No NaN values?</text>

  <path class="arrow" d="M 1052 300 H 1164"/>

  <rect class="panel" x="1188" y="190" width="264" height="220" rx="22"/>
  <text class="ink h2" x="1226" y="246">3. Mode</text>
  <text class="mono" x="1226" y="302">train()</text>
  <text class="mono" x="1226" y="342">eval()</text>
  <text class="mono" x="1226" y="382">no_grad()</text>

  <path class="arrow" d="M 1320 432 V 526"/>

  <rect class="panel" x="990" y="550" width="462" height="260" rx="22"/>
  <text class="ink h2" x="1028" y="606">4. Update order</text>
  <rect class="blue" x="1028" y="642" width="178" height="58" rx="16"/>
  <text class="mono" x="1054" y="680">zero_grad</text>
  <path class="thin" d="M 1218 672 H 1260"/>
  <rect class="green" x="1276" y="642" width="138" height="58" rx="16"/>
  <text class="mono" x="1298" y="680">backward</text>
  <rect class="gold" x="1028" y="724" width="178" height="58" rx="16"/>
  <text class="mono" x="1074" y="762">clip</text>
  <path class="thin" d="M 1218 754 H 1260"/>
  <rect class="red" x="1276" y="724" width="138" height="58" rx="16"/>
  <text class="mono" x="1308" y="762">step</text>

  <path class="arrow" d="M 966 680 H 852"/>

  <rect class="panel" x="512" y="550" width="416" height="260" rx="22"/>
  <text class="ink h2" x="550" y="606">5. Learning rate</text>
  <text class="ink body" x="550" y="660">Too large: loss jumps or NaN</text>
  <text class="ink body" x="550" y="704">Too small: loss barely moves</text>
  <text class="small" x="550" y="764">Try a smaller run before redesigning.</text>

  <path class="arrow" d="M 488 680 H 374"/>

  <rect class="panel" x="84" y="550" width="390" height="260" rx="22"/>
  <text class="ink h2" x="122" y="606">6. Tiny overfit test</text>
  <text class="ink body" x="122" y="660">Can one small batch reach</text>
  <text class="ink body" x="122" y="704">very low loss?</text>
  <text class="small" x="122" y="764">If not, inspect the loop first.</text>

  <rect class="green" x="230" y="890" width="1076" height="68" rx="20"/>
  <text class="ink body" x="270" y="933">Debug from observable facts: batch -> label -> loss -> gradient -> update -> curve.</text>
</svg>
