<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Short-circuit safety check</title>
  <desc id="desc">A Python and expression checks the left condition first and skips the right condition when the left side is false.</desc>
  <rect width="960" height="540" fill="#f7fafc"/>
  <text x="56" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#172033">Short-circuit safety check</text>
  <text x="56" y="108" font-family="Arial, sans-serif" font-size="18" fill="#506070">if len(data) &gt; 0 and data[0] &gt; 10:</text>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="88" y="190" width="220" height="100" rx="10" fill="#ffffff" stroke="#2f80ed" stroke-width="3"/>
    <text x="198" y="232" font-size="20" font-weight="700" fill="#172033">1. Check length</text>
    <text x="198" y="262" font-size="16" fill="#506070">len(data) &gt; 0</text>
    <path d="M308 240 H424" stroke="#667085" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="424" y="170" width="220" height="140" rx="10" fill="#fff7e8" stroke="#f2994a" stroke-width="3"/>
    <text x="534" y="214" font-size="20" font-weight="700" fill="#172033">If True</text>
    <text x="534" y="246" font-size="16" fill="#506070">then read data[0]</text>
    <text x="534" y="276" font-size="16" fill="#506070">safe: list is not empty</text>
    <path d="M198 290 C198 390 534 400 534 310" fill="none" stroke="#12b76a" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="286" y="382" font-size="18" font-weight="700" fill="#087443">If False, skip the right side</text>
    <rect x="704" y="190" width="180" height="100" rx="10" fill="#ffffff" stroke="#d0d5dd" stroke-width="2"/>
    <text x="794" y="232" font-size="19" font-weight="700" fill="#172033">No crash</text>
    <text x="794" y="262" font-size="16" fill="#506070">no data[0] access</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#667085"/>
    </marker>
  </defs>
</svg>
