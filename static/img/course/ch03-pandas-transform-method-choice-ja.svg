<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Pandas 変換メソッド選択マップ</title>
  <desc id="desc">map、replace、apply、sort、rank、cut、qcut を選ぶための図。</desc>
  <rect width="1200" height="680" fill="#f6f8fb"/>
  <text x="64" y="76" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">変換では、どの道具を先に使う？</text>
  <text x="64" y="114" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52606d">関数名ではなく、やりたいことから考えます。</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">
    <rect x="448" y="154" width="304" height="76" rx="8" fill="#fff" stroke="#9fb3c8" stroke-width="2"/>
    <text x="600" y="187" font-weight="700" fill="#102a43">この列を</text><text x="600" y="212" fill="#102a43">どう変えたい？</text>
    <g stroke="#627d98" stroke-width="2" fill="none"><path d="M600 230 L600 270"/><path d="M600 270 L180 270 L180 320"/><path d="M600 270 L390 270 L390 320"/><path d="M600 270 L600 320"/><path d="M600 270 L810 270 L810 320"/><path d="M600 270 L1020 270 L1020 320"/></g>
    <rect x="70" y="320" width="220" height="116" rx="8" fill="#e0f2fe" stroke="#38bdf8"/><text x="180" y="356" font-weight="700" fill="#0f172a">コードを翻訳</text><text x="180" y="385" fill="#334155">M -> 男性</text><text x="180" y="414" font-weight="700" fill="#075985">map()</text>
    <rect x="280" y="320" width="220" height="116" rx="8" fill="#fee2e2" stroke="#f87171"/><text x="390" y="356" font-weight="700" fill="#0f172a">汚い値を修正</text><text x="390" y="385" fill="#334155">BJ -> 北京</text><text x="390" y="414" font-weight="700" fill="#991b1b">replace()</text>
    <rect x="490" y="320" width="220" height="116" rx="8" fill="#dcfce7" stroke="#4ade80"/><text x="600" y="356" font-weight="700" fill="#0f172a">独自ルール</text><text x="600" y="385" fill="#334155">行合計、ラベル</text><text x="600" y="414" font-weight="700" fill="#166534">apply()</text>
    <rect x="700" y="320" width="220" height="116" rx="8" fill="#ede9fe" stroke="#a78bfa"/><text x="810" y="356" font-weight="700" fill="#0f172a">並べ替え</text><text x="810" y="385" fill="#334155">Top N、昇順</text><text x="810" y="414" font-weight="700" fill="#5b21b6">sort / rank</text>
    <rect x="910" y="320" width="220" height="116" rx="8" fill="#fef3c7" stroke="#fbbf24"/><text x="1020" y="356" font-weight="700" fill="#0f172a">区間に分ける</text><text x="1020" y="385" fill="#334155">年齢帯、消費帯</text><text x="1020" y="414" font-weight="700" fill="#92400e">cut() / qcut()</text>
    <rect x="278" y="508" width="644" height="74" rx="8" fill="#fff" stroke="#d9e2ec" stroke-width="2"/><text x="600" y="540" font-weight="700" fill="#102a43">初心者ルール</text><text x="600" y="566" fill="#52606d">組み込みのベクトル化処理でできるなら、apply() より先に使います。</text>
  </g>
</svg>
