<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Pandas transformation method choice map</title>
  <desc id="desc">A decision map for choosing map, replace, apply, sort, rank, cut, and qcut.</desc>
  <rect width="1200" height="680" fill="#f6f8fb"/>
  <text x="64" y="76" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">Which transformation tool should I reach for?</text>
  <text x="64" y="114" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52606d">Start from the intent, not from the function name.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="18" text-anchor="middle">
    <rect x="448" y="154" width="304" height="76" rx="8" fill="#ffffff" stroke="#9fb3c8" stroke-width="2"/>
    <text x="600" y="187" font-weight="700" fill="#102a43">What do I want</text>
    <text x="600" y="212" fill="#102a43">this column to become?</text>
    <g stroke="#627d98" stroke-width="2" fill="none">
      <path d="M600 230 L600 270"/>
      <path d="M600 270 L180 270 L180 320"/>
      <path d="M600 270 L390 270 L390 320"/>
      <path d="M600 270 L600 320"/>
      <path d="M600 270 L810 270 L810 320"/>
      <path d="M600 270 L1020 270 L1020 320"/>
    </g>
    <g>
      <rect x="70" y="320" width="220" height="116" rx="8" fill="#e0f2fe" stroke="#38bdf8"/>
      <text x="180" y="356" font-weight="700" fill="#0f172a">Translate codes</text>
      <text x="180" y="385" fill="#334155">M -> male</text>
      <text x="180" y="414" font-weight="700" fill="#075985">map()</text>
      <rect x="280" y="320" width="220" height="116" rx="8" fill="#fee2e2" stroke="#f87171"/>
      <text x="390" y="356" font-weight="700" fill="#0f172a">Fix dirty values</text>
      <text x="390" y="385" fill="#334155">BJ -> Beijing</text>
      <text x="390" y="414" font-weight="700" fill="#991b1b">replace()</text>
      <rect x="490" y="320" width="220" height="116" rx="8" fill="#dcfce7" stroke="#4ade80"/>
      <text x="600" y="356" font-weight="700" fill="#0f172a">Custom rule</text>
      <text x="600" y="385" fill="#334155">row total, labels</text>
      <text x="600" y="414" font-weight="700" fill="#166534">apply()</text>
      <rect x="700" y="320" width="220" height="116" rx="8" fill="#ede9fe" stroke="#a78bfa"/>
      <text x="810" y="356" font-weight="700" fill="#0f172a">Order values</text>
      <text x="810" y="385" fill="#334155">top N, low to high</text>
      <text x="810" y="414" font-weight="700" fill="#5b21b6">sort / rank</text>
      <rect x="910" y="320" width="220" height="116" rx="8" fill="#fef3c7" stroke="#fbbf24"/>
      <text x="1020" y="356" font-weight="700" fill="#0f172a">Make intervals</text>
      <text x="1020" y="385" fill="#334155">age bands</text>
      <text x="1020" y="414" font-weight="700" fill="#92400e">cut() / qcut()</text>
    </g>
    <rect x="278" y="508" width="644" height="74" rx="8" fill="#ffffff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="600" y="540" font-weight="700" fill="#102a43">Beginner rule</text>
    <text x="600" y="566" fill="#52606d">If a built-in vectorized method can do it, use that before apply().</text>
  </g>
</svg>
