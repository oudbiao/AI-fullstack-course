<svg xmlns="http://www.w3.org/2000/svg" width="720" height="790" viewBox="0 0 720 790" role="img" aria-labelledby="title desc">
  <title id="title">NLP portfolio evidence pack</title>
  <desc id="desc">A checklist of evidence files for a reviewable NLP project.</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="790" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">NLP Evidence Pack</text>
  <text x="360" y="88" text-anchor="middle" class="sub">A text project is reviewable when labels, schema, metrics, and failures are visible.</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">text_cleaning.py</text><text x="28" y="59" class="text">Cleaning, tokenization, before/after examples.</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">label_guide.md</text><text x="28" y="59" class="text">Definitions, boundary cases, positive and negative examples.</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">classification_report.md</text><text x="28" y="59" class="text">Metrics, confusion matrix, error table, comparison.</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">extraction_examples.jsonl</text><text x="28" y="59" class="text">Source text, extracted fields, validation result.</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">failure_cases.md</text><text x="28" y="59" class="text">Confusing labels, missing fields, unsupported facts.</text></g>
  <g transform="translate(86 648)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#db2777" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">Task, run command, input/output, metrics, limits.</text></g>
</svg>
