<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Pandas resample 与 rolling 时间线</title>
  <desc id="desc">教学图：resample 改变时间频率，rolling 沿时间移动固定窗口。</desc>
  <rect width="1200" height="680" fill="#fbfaf7"/>
  <text x="64" y="76" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2933">时间序列：resample 改频率，rolling 移窗口</text>
  <text x="64" y="114" font-family="Inter, Arial, sans-serif" font-size="18" fill="#52606d">它们都沿时间工作，但回答的是不同问题。</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="80" y="178" width="1040" height="160" rx="8" fill="#fff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="116" y="222" font-size="24" font-weight="700" fill="#102a43">resample("ME").sum()</text>
    <text x="116" y="254" font-size="17" fill="#52606d">把每天的数据放进日历桶里，再汇总成月度结果。</text>
    <g transform="translate(116 286)"><line x1="0" y1="0" x2="900" y2="0" stroke="#9fb3c8" stroke-width="3"/><g fill="#38bdf8"><circle cx="20" cy="0" r="7"/><circle cx="55" cy="0" r="7"/><circle cx="90" cy="0" r="7"/><circle cx="125" cy="0" r="7"/><circle cx="210" cy="0" r="7"/><circle cx="245" cy="0" r="7"/><circle cx="280" cy="0" r="7"/><circle cx="365" cy="0" r="7"/><circle cx="400" cy="0" r="7"/><circle cx="435" cy="0" r="7"/></g><g fill="none" stroke="#0f766e" stroke-width="3"><rect x="0" y="-24" width="155" height="48" rx="6"/><rect x="190" y="-24" width="115" height="48" rx="6"/><rect x="345" y="-24" width="115" height="48" rx="6"/></g><text x="78" y="58" font-size="16" text-anchor="middle" fill="#0f766e">1 月汇总</text><text x="248" y="58" font-size="16" text-anchor="middle" fill="#0f766e">2 月汇总</text><text x="402" y="58" font-size="16" text-anchor="middle" fill="#0f766e">3 月汇总</text></g>
    <rect x="80" y="392" width="1040" height="160" rx="8" fill="#fff" stroke="#d9e2ec" stroke-width="2"/>
    <text x="116" y="436" font-size="24" font-weight="700" fill="#102a43">rolling(window=7).mean()</text>
    <text x="116" y="468" font-size="17" fill="#52606d">固定大小的窗口每天向前滑动，计算局部统计量。</text>
    <g transform="translate(116 500)"><line x1="0" y1="0" x2="900" y2="0" stroke="#9fb3c8" stroke-width="3"/><g fill="#f97316"><circle cx="20" cy="0" r="7"/><circle cx="55" cy="0" r="7"/><circle cx="90" cy="0" r="7"/><circle cx="125" cy="0" r="7"/><circle cx="160" cy="0" r="7"/><circle cx="195" cy="0" r="7"/><circle cx="230" cy="0" r="7"/><circle cx="265" cy="0" r="7"/><circle cx="300" cy="0" r="7"/><circle cx="335" cy="0" r="7"/></g><rect x="0" y="-27" width="250" height="54" rx="6" fill="#fed7aa" fill-opacity=".5" stroke="#f97316" stroke-width="3"/><path d="M252 0 L310 0" stroke="#f97316" stroke-width="3" marker-end="url(#arrow)"/><text x="125" y="60" font-size="16" text-anchor="middle" fill="#9a3412">7 天窗口</text></g>
  </g>
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#f97316"/></marker></defs>
</svg>
