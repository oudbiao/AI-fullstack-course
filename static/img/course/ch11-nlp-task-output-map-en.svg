<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">NLP task output map</title>
  <desc id="desc">A map showing NLP tasks by output type: classification, extraction, generation, QA retrieval, and pretrained model comparison.</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#fff7ed"/>
  <text x="360" y="58" text-anchor="middle" class="title">Choose NLP Task By Output</text>
  <text x="360" y="88" text-anchor="middle" class="sub">Do not choose the model before the expected output is clear.</text>
  <g transform="translate(86 128)"><rect width="548" height="88" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="35" class="label">Category label</text><text x="28" y="62" class="text">Classification: accuracy, F1, confusion matrix.</text></g>
  <g transform="translate(86 240)"><rect width="548" height="88" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="35" class="label">Entity or field JSON</text><text x="28" y="62" class="text">Extraction / NER: precision, recall, field validation.</text></g>
  <g transform="translate(86 352)"><rect width="548" height="88" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="35" class="label">Generated text</text><text x="28" y="62" class="text">Summarization / generation: factual consistency and coverage.</text></g>
  <g transform="translate(86 464)"><rect width="548" height="88" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="35" class="label">Answer with evidence</text><text x="28" y="62" class="text">QA / retrieval: hit rate, answer quality, source support.</text></g>
  <g transform="translate(86 576)"><rect width="548" height="88" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="35" class="label">Model behavior comparison</text><text x="28" y="62" class="text">Traditional, pretrained, or LLM: quality, cost, latency.</text></g>
</svg>
