<svg xmlns="http://www.w3.org/2000/svg" width="720" height="820" viewBox="0 0 720 820" role="img" aria-labelledby="title desc">
  <title id="title">NLP タスク出力図</title>
  <desc id="desc">出力タイプ別に NLP タスクを示す図。分類、抽出、生成、QA 検索、事前学習モデル比較。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="820" fill="#fff7ed"/>
  <text x="360" y="58" text-anchor="middle" class="title">出力で NLP タスクを選ぶ</text>
  <text x="360" y="88" text-anchor="middle" class="sub">期待出力が明確になる前にモデルを選びません。</text>
  <g transform="translate(86 128)"><rect width="548" height="88" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="35" class="label">カテゴリラベル</text><text x="28" y="62" class="text">分類：accuracy、F1、混同行列。</text></g>
  <g transform="translate(86 240)"><rect width="548" height="88" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="35" class="label">entity または field JSON</text><text x="28" y="62" class="text">抽出 / NER：precision、recall、field validation。</text></g>
  <g transform="translate(86 352)"><rect width="548" height="88" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="35" class="label">生成テキスト</text><text x="28" y="62" class="text">要約 / 生成：事実一貫性と網羅性。</text></g>
  <g transform="translate(86 464)"><rect width="548" height="88" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="35" class="label">証拠付き回答</text><text x="28" y="62" class="text">QA / 検索：hit rate、回答品質、出典支援。</text></g>
  <g transform="translate(86 576)"><rect width="548" height="88" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="35" class="label">モデル挙動比較</text><text x="28" y="62" class="text">伝統、事前学習、LLM：品質、コスト、遅延。</text></g>
</svg>
