<svg xmlns="http://www.w3.org/2000/svg" width="720" height="930" viewBox="0 0 720 930" role="img" aria-labelledby="title desc">
  <title id="title">多模态工作流闭环</title>
  <desc id="desc">从输入到解析对齐、理解或生成、审核、导出集成的多模态竖向工作流。</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#334155"/></marker><style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style></defs>
  <rect width="720" height="930" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">多模态产品工作流</text>
  <text x="360" y="88" text-anchor="middle" class="sub">保留来源、版本、审核和导出边界。</text>
  <g transform="translate(95 132)"><rect width="530" height="82" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="34" class="label">1. 输入</text><text x="28" y="60" class="text">文本、图片、截图、PDF、音频、视频、素材。</text></g><path d="M360 216 V256" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 268)"><rect width="530" height="82" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="34" class="label">2. 解析 / 对齐</text><text x="28" y="60" class="text">OCR、转写、版面、区域、时间戳。</text></g><path d="M360 352 V392" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 404)"><rect width="530" height="82" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="34" class="label">3. 理解 / 生成</text><text x="28" y="60" class="text">答案、标题、图片、语音、分镜、视频计划。</text></g><path d="M360 488 V528" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 540)"><rect width="530" height="82" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="34" class="label">4. 编辑 / 审核</text><text x="28" y="60" class="text">人工选择、事实检查、版权、肖像权。</text></g><path d="M360 624 V664" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 676)"><rect width="530" height="82" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="34" class="label">5. 导出 / 集成</text><text x="28" y="60" class="text">RAG 索引、Agent trace、创意包、最终 Demo。</text></g>
  <rect x="95" y="800" width="530" height="58" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="360" y="836" text-anchor="middle" class="label">不能检查或引用的内容，先留在审核阶段。</text>
</svg>
