<svg xmlns="http://www.w3.org/2000/svg" width="720" height="760" viewBox="0 0 720 760" role="img" aria-labelledby="title desc">
  <title id="title">视觉作品集证据包</title>
  <desc id="desc">可复查计算机视觉项目需要保留的证据文件清单图。</desc>
  <style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.file{font:700 18px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style>
  <rect width="720" height="760" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">视觉证据包</text>
  <text x="360" y="88" text-anchor="middle" class="sub">数据、指标和失败可见，视觉项目才可复查。</text>
  <g transform="translate(86 128)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#2563eb" stroke-width="2"/><text x="28" y="33" class="file">pixel_lab.py / opencv_demo.py</text><text x="28" y="59" class="text">图像读取或生成、预处理、保存输出。</text></g>
  <g transform="translate(86 232)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#16a34a" stroke-width="2"/><text x="28" y="33" class="file">vision_dataset.md</text><text x="28" y="59" class="text">来源、类别、数量、标注方式、限制。</text></g>
  <g transform="translate(86 336)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#d97706" stroke-width="2"/><text x="28" y="33" class="file">eval_results.md</text><text x="28" y="59" class="text">Accuracy/F1、mAP、IoU/Dice、OCR 命中率。</text></g>
  <g transform="translate(86 440)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#dc2626" stroke-width="2"/><text x="28" y="33" class="file">failure_cases.md</text><text x="28" y="59" class="text">错误图片、可能原因、下一步修复。</text></g>
  <g transform="translate(86 544)"><rect width="548" height="82" rx="18" fill="#fff" stroke="#7c3aed" stroke-width="2"/><text x="28" y="33" class="file">README.md</text><text x="28" y="59" class="text">任务目标、运行命令、输入输出、场景边界。</text></g>
</svg>
