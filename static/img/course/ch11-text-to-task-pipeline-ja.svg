<svg xmlns="http://www.w3.org/2000/svg" width="720" height="930" viewBox="0 0 720 930" role="img" aria-labelledby="title desc">
  <title id="title">テキストから NLP タスクへのパイプライン</title>
  <desc id="desc">生テキストから cleaning、tokenization、representation、task output、evaluation へ進む縦型 NLP パイプライン。</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2 2 L10 6 L2 10 Z" fill="#334155"/></marker><style>.title{font:700 30px Arial,sans-serif;fill:#0f172a}.sub{font:400 17px Arial,sans-serif;fill:#475569}.label{font:700 20px Arial,sans-serif;fill:#111827}.text{font:400 15px Arial,sans-serif;fill:#374151}</style></defs>
  <rect width="720" height="930" fill="#f8fafc"/>
  <text x="360" y="58" text-anchor="middle" class="title">生テキストから NLP タスクへ</text>
  <text x="360" y="88" text-anchor="middle" class="sub">意味、schema、評価を見えるようにします。</text>
  <g transform="translate(95 132)"><rect width="530" height="72" rx="18" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/><text x="28" y="30" class="label">1. 生テキスト</text><text x="28" y="55" class="text">レビュー、ログ、チャット、文書、契約書</text></g><path d="M360 206 V242" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 254)"><rect width="530" height="72" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/><text x="28" y="30" class="label">2. Cleaning</text><text x="28" y="55" class="text">意味を消さずにテキストを整える</text></g><path d="M360 328 V364" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 376)"><rect width="530" height="72" rx="18" fill="#fef3c7" stroke="#d97706" stroke-width="2"/><text x="28" y="30" class="label">3. Tokenization</text><text x="28" y="55" class="text">単語、サブワード、token、専門用語</text></g><path d="M360 450 V486" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 498)"><rect width="530" height="72" rx="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/><text x="28" y="30" class="label">4. Representation</text><text x="28" y="55" class="text">BoW、TF-IDF、embedding、文脈ベクトル</text></g><path d="M360 572 V608" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 620)"><rect width="530" height="72" rx="18" fill="#fce7f3" stroke="#db2777" stroke-width="2"/><text x="28" y="30" class="label">5. タスク出力</text><text x="28" y="55" class="text">label、entity、summary、answer、検索 hit</text></g><path d="M360 694 V730" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(95 742)"><rect width="530" height="72" rx="18" fill="#ccfbf1" stroke="#0f766e" stroke-width="2"/><text x="28" y="30" class="label">6. 評価</text><text x="28" y="55" class="text">指標、誤例、出典確認、事実一貫性</text></g>
</svg>
