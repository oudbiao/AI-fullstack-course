<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">House price residual review map</title>
  <desc id="desc">A beginner map showing how to move from predictions to residual buckets and next project actions.</desc>
  <rect width="1200" height="675" fill="#f7fafc"/>
  <text x="80" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">House Price Project: Read Errors Before Chasing Scores</text>
  <text x="80" y="116" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4b5563">Use residuals to explain where the regression model is weak.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="180" width="210" height="110" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="195" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#1e3a8a">Actual vs Predicted</text>
    <text x="195" y="255" text-anchor="middle" font-size="16" fill="#1e40af">scatter plot</text>
    <path d="M330 235h90" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="450" y="180" width="210" height="110" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="555" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#78350f">Residuals</text>
    <text x="555" y="255" text-anchor="middle" font-size="16" fill="#92400e">y_true - y_pred</text>
    <path d="M690 235h90" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="810" y="180" width="210" height="110" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="915" y="223" text-anchor="middle" font-size="22" font-weight="700" fill="#14532d">Error Buckets</text>
    <text x="915" y="255" text-anchor="middle" font-size="16" fill="#166534">low / mid / high price</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="160" y="390" width="880" height="145" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="210" y="438" font-size="22" font-weight="700" fill="#111827">What to ask after the chart</text>
    <text x="230" y="480" font-size="18" fill="#374151">1. Which price range has the largest average error?</text>
    <text x="230" y="515" font-size="18" fill="#374151">2. Is the model underpredicting expensive homes?</text>
    <text x="650" y="480" font-size="18" fill="#374151">3. Do regions or feature groups fail together?</text>
    <text x="650" y="515" font-size="18" fill="#374151">4. Should the next step be data, features, or model?</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
