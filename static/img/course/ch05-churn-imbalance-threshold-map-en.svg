<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Customer churn imbalance and threshold map</title>
  <desc id="desc">A beginner map comparing class weight, SMOTE, and threshold tuning for churn prediction.</desc>
  <rect width="1200" height="675" fill="#f8fafc"/>
  <text x="80" y="78" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Churn Prediction: Imbalance Is Not Just a Model Problem</text>
  <text x="80" y="116" font-family="Inter, Arial, sans-serif" font-size="18" fill="#4b5563">Separate three levers before reading the code.</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="90" y="185" width="280" height="150" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="230" y="232" text-anchor="middle" font-size="24" font-weight="700" fill="#7f1d1d">Class Distribution</text>
    <text x="230" y="270" text-anchor="middle" font-size="17" fill="#991b1b">85% retained</text>
    <text x="230" y="300" text-anchor="middle" font-size="17" fill="#991b1b">15% churn</text>
    <path d="M390 260h80" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="500" y="185" width="280" height="150" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="3"/>
    <text x="640" y="232" text-anchor="middle" font-size="24" font-weight="700" fill="#0c4a6e">Training Lever</text>
    <text x="640" y="270" text-anchor="middle" font-size="17" fill="#075985">class_weight or SMOTE</text>
    <text x="640" y="300" text-anchor="middle" font-size="17" fill="#075985">training split only</text>
    <path d="M800 260h80" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <rect x="910" y="185" width="220" height="150" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="1020" y="232" text-anchor="middle" font-size="24" font-weight="700" fill="#14532d">Decision Lever</text>
    <text x="1020" y="270" text-anchor="middle" font-size="17" fill="#166534">threshold</text>
    <text x="1020" y="300" text-anchor="middle" font-size="17" fill="#166534">precision vs recall</text>
  </g>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="145" y="425" width="910" height="115" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="190" y="470" font-size="22" font-weight="700" fill="#111827">Beginner guardrail</text>
    <text x="190" y="508" font-size="18" fill="#374151">Do not compare accuracy only. Ask what is worse: missing churn users, or contacting too many safe users?</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2l8 4-8 4z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
