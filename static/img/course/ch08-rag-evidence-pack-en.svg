<svg xmlns="http://www.w3.org/2000/svg" width="720" height="860" viewBox="0 0 720 860" role="img" aria-labelledby="title desc">
  <title id="title">RAG portfolio evidence pack</title>
  <desc id="desc">A checklist style diagram showing the files that make a RAG portfolio project reviewable.</desc>
  <style>
    .title{font:700 30px Arial,sans-serif;fill:#0f172a}
    .sub{font:400 17px Arial,sans-serif;fill:#475569}
    .file{font:700 18px Arial,sans-serif;fill:#111827}
    .text{font:400 15px Arial,sans-serif;fill:#374151}
  </style>
  <rect width="720" height="860" fill="#f0fdfa"/>
  <text x="360" y="58" text-anchor="middle" class="title">RAG Evidence Pack</text>
  <text x="360" y="88" text-anchor="middle" class="sub">A demo becomes trustworthy when reviewers can inspect these files.</text>
  <g transform="translate(85 130)">
    <rect width="550" height="88" rx="18" fill="#ffffff" stroke="#0f766e" stroke-width="2"/>
    <text x="28" y="35" class="file">chunks.jsonl</text>
    <text x="28" y="63" class="text">Chunk text, source, section, page, version.</text>
  </g>
  <g transform="translate(85 240)">
    <rect width="550" height="88" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="28" y="35" class="file">retrieval_logs.jsonl</text>
    <text x="28" y="63" class="text">Question, top-k chunks, scores, source IDs.</text>
  </g>
  <g transform="translate(85 350)">
    <rect width="550" height="88" rx="18" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="28" y="35" class="file">eval_questions.csv</text>
    <text x="28" y="63" class="text">Fixed questions, expected sources, answer points.</text>
  </g>
  <g transform="translate(85 460)">
    <rect width="550" height="88" rx="18" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <text x="28" y="35" class="file">failure_cases.md</text>
    <text x="28" y="63" class="text">Retrieval, generation, citation, deploy failures.</text>
  </g>
  <g transform="translate(85 570)">
    <rect width="550" height="88" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <text x="28" y="35" class="file">rag_config.md</text>
    <text x="28" y="63" class="text">Chunk size, overlap, top-k, rerank, prompt version.</text>
  </g>
  <g transform="translate(85 680)">
    <rect width="550" height="88" rx="18" fill="#ffffff" stroke="#db2777" stroke-width="2"/>
    <text x="28" y="35" class="file">README.md</text>
    <text x="28" y="63" class="text">Run command, sample answer, evaluation result, next fix.</text>
  </g>
</svg>
